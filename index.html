<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiniela Mundial 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #080A0E;
  --s1:       #0F1218;
  --s2:       #161B24;
  --s3:       #1E2430;
  --border:   rgba(255,255,255,0.06);
  --border2:  rgba(255,255,255,0.12);
  --text:     #EEF0F4;
  --muted:    rgba(255,255,255,0.38);
  --muted2:   rgba(255,255,255,0.55);
  --gold:     #F5C842;
  --gold-bg:  rgba(245,200,66,0.10);
  --gold-brd: rgba(245,200,66,0.25);
  --silver:   #C8D0DC;
  --silver-bg:rgba(200,208,220,0.08);
  --silver-brd:rgba(200,208,220,0.22);
  --bronze:   #D4845A;
  --bronze-bg:rgba(212,132,90,0.08);
  --bronze-brd:rgba(212,132,90,0.22);
  --green:    #3DDC84;
  --green-bg: rgba(61,220,132,0.10);
  --red:      #FF6060;
  --red-bg:   rgba(255,96,96,0.10);
  --blue:     #5BB8FF;
  --blue-bg:  rgba(91,184,255,0.10);
  --live:     #FF4444;
  --live-bg:  rgba(255,68,68,0.12);
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body::before{
  content:'';
  position:fixed;
  inset:0;
  z-index:-1;
  background:
    radial-gradient(ellipse 120% 80% at 50% 110%, #0d3d1a 0%, #071a0c 40%, #040a06 70%),
    repeating-linear-gradient(
      0deg,
      transparent,
      transparent 28px,
      rgba(255,255,255,0.018) 28px,
      rgba(255,255,255,0.018) 30px
    ),
    repeating-linear-gradient(
      90deg,
      transparent,
      transparent 28px,
      rgba(255,255,255,0.012) 28px,
      rgba(255,255,255,0.012) 30px
    );
}
body::after{
  content:'';
  position:fixed;
  inset:0;
  z-index:-1;
  background:
    radial-gradient(ellipse 60% 40% at 50% 55%, rgba(34,100,44,0.35) 0%, transparent 70%),
    linear-gradient(to bottom, rgba(8,10,14,0.95) 0%, rgba(8,10,14,0.4) 30%, rgba(8,10,14,0.4) 70%, rgba(8,10,14,0.95) 100%);
}
body{background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif;display:flex;flex-direction:column;}

.hdr{display:flex;align-items:center;justify-content:space-between;padding:8px 20px;border-bottom:1px solid var(--border);flex-shrink:0;}
.hdr-title{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:19px;letter-spacing:.05em;text-transform:uppercase;}
.hdr-title em{color:var(--gold);font-style:normal;}
.hdr-meta{display:flex;align-items:center;gap:20px;font-size:12px;color:var(--muted);}
.live-dot{width:7px;height:7px;border-radius:50%;background:var(--green);display:inline-block;margin-right:5px;animation:blink 2s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}

.main{display:grid;grid-template-columns:420px 1fr;flex:1;overflow:hidden;}
.panel{padding:8px 12px;overflow:hidden;border-right:1px solid var(--border);display:flex;flex-direction:column;}
.panel:last-child{border-right:none;}

.lbl{font-family:'Barlow Condensed',sans-serif;font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:5px;}

/* PODIO */
.podio-wrap{padding:6px 20px 0;border-bottom:1px solid var(--border);flex-shrink:0;}
.podio{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:6px;}
.podio-card{border-radius:8px;padding:7px 12px;border:1px solid var(--border);position:relative;overflow:hidden;}
.podio-card.p1{background:var(--gold-bg);border-color:var(--gold-brd);}
.podio-card.p2{background:var(--silver-bg);border-color:var(--silver-brd);}
.podio-card.p3{background:var(--bronze-bg);border-color:var(--bronze-brd);}
.podio-medal{font-size:16px;margin-bottom:1px;}
.podio-pos{font-family:'Barlow Condensed',sans-serif;font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;margin-bottom:1px;}
.podio-card.p1 .podio-pos{color:var(--gold);}
.podio-card.p2 .podio-pos{color:var(--silver);}
.podio-card.p3 .podio-pos{color:var(--bronze);}
.podio-nombre{font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:800;margin-bottom:2px;}
.podio-pts{font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:900;line-height:1;}
.podio-card.p1 .podio-pts{color:var(--gold);}
.podio-card.p2 .podio-pts{color:var(--silver);}
.podio-card.p3 .podio-pts{color:var(--bronze);}
.podio-sub{font-size:10px;color:var(--muted);margin-top:2px;}
.podio-premio{display:inline-block;margin-top:3px;font-size:9px;font-weight:600;padding:1px 6px;border-radius:20px;letter-spacing:.04em;}
.podio-card.p1 .podio-premio{background:var(--gold-bg);color:var(--gold);border:1px solid var(--gold-brd);}
.podio-card.p2 .podio-premio{background:var(--silver-bg);color:var(--silver);border:1px solid var(--silver-brd);}
.podio-card.p3 .podio-premio{background:var(--bronze-bg);color:var(--bronze);border:1px solid var(--bronze-brd);}
.podio-cambio{position:absolute;top:6px;right:8px;font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;}
.podio-cambio.up{color:var(--green);}
.podio-cambio.down{color:var(--red);}
.podio-cambio.same{color:var(--muted);}

/* PARTIDO EN VIVO */
.match-card{border-radius:6px;padding:6px 10px;border:1px solid var(--border);background:var(--s1);margin-bottom:0;}
.match-card.en-vivo{border-color:rgba(255,68,68,0.4);background:var(--live-bg);}
.match-card.proximo{border-color:var(--gold-brd);background:var(--gold-bg);}
.match-tag{font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;margin-bottom:3px;display:flex;align-items:center;gap:4px;}
.match-card.en-vivo .match-tag{color:var(--live);}
.match-card.proximo .match-tag{color:var(--gold);}
.live-pulse{width:8px;height:8px;border-radius:50%;background:var(--live);animation:blink .8s infinite;}
.match-nombre{font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:800;margin-bottom:3px;}
.match-score-wrap{display:flex;align-items:center;justify-content:space-between;}
.match-score{font-family:'Barlow Condensed',sans-serif;font-size:30px;font-weight:900;line-height:1;letter-spacing:.02em;}
.match-card.en-vivo .match-score{color:var(--live);}
.match-card.proximo .match-score{color:var(--gold);font-size:22px;}
.match-minuto{font-size:12px;color:var(--muted);text-align:right;}
.match-fecha{font-size:11px;color:var(--muted);}

/* RANKING */
.rank-table{width:100%;border-collapse:collapse;}
.rank-table th{font-size:10px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--muted);padding:0 5px 5px;text-align:left;border-bottom:1px solid var(--border);}
.rank-table th.r{text-align:right;}
.rank-table td{padding:4px 5px;border-bottom:1px solid var(--border);vertical-align:middle;font-size:12px;}
.rank-table td.r{text-align:right;}
.rank-table tr:last-child td{border-bottom:none;}
.rank-table tr:hover td{background:var(--s2);}
.rank-table tr.r1 td{background:var(--gold-bg);}
.rank-table tr.r2 td{background:var(--silver-bg);}
.rank-table tr.r3 td{background:var(--bronze-bg);}
.rk-pos{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;color:var(--muted);width:22px;}
.r1 .rk-pos{color:var(--gold);}
.r2 .rk-pos{color:var(--silver);}
.r3 .rk-pos{color:var(--bronze);}
.rk-nombre{font-weight:500;}
.rk-pts{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:800;}
.r1 .rk-pts{color:var(--gold);}
.rk-bar-wrap{width:28px;height:3px;background:var(--s3);border-radius:2px;display:inline-block;vertical-align:middle;margin-left:3px;}
.rk-bar{height:4px;border-radius:2px;background:var(--muted);}
.r1 .rk-bar{background:var(--gold);}
.r2 .rk-bar{background:var(--silver);}
.r3 .rk-bar{background:var(--bronze);}
.badge{display:inline-block;font-size:11px;font-weight:600;padding:2px 6px;border-radius:20px;min-width:22px;text-align:center;}
.bg{background:var(--green-bg);color:var(--green);}
.bb{background:var(--blue-bg);color:var(--blue);}
.cambio-cell{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;text-align:right;}
.cambio-cell.up{color:var(--green);}
.cambio-cell.down{color:var(--red);}
.cambio-cell.same{color:var(--muted);}
.pill{font-size:11px;font-weight:600;background:var(--s2);border:1px solid var(--border2);border-radius:20px;padding:2px 7px;white-space:nowrap;}

.pron-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--border);font-size:12px;}
.pron-row:last-child{border-bottom:none;}
.pron-score{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:15px;color:var(--gold);}

.stat-grid{display:flex;flex-direction:column;gap:3px;}
.stat-card{background:var(--s1);border:1px solid var(--border);border-radius:6px;padding:4px 8px;display:flex;align-items:baseline;gap:6px;}
.stat-lbl{font-size:10px;color:var(--muted);white-space:nowrap;flex-shrink:0;}
.stat-val{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;}
.stat-det{font-size:9px;color:var(--muted);margin-left:2px;}

.part-row{display:flex;align-items:center;gap:6px;padding:5px 0;border-bottom:1px solid var(--border);font-size:12px;}
.part-row:last-child{border-bottom:none;}
.part-fecha{font-size:10px;color:var(--muted);min-width:58px;}
.part-nombre{flex:1;font-weight:500;}
.part-score{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:14px;}
.part-score.played{color:var(--gold);}
.part-score.live{color:var(--live);animation:blink 1.5s infinite;}
.part-score.pending{color:var(--muted);font-size:11px;font-weight:400;}

.divider{height:1px;background:var(--border);margin:6px 0;}
.loading{color:var(--muted);font-size:12px;padding:12px 0;text-align:center;}
.grupos-grid{display:grid;grid-template-columns:1fr 1fr 1fr;grid-template-rows:repeat(4,1fr);gap:6px;height:100%;}
.grupo-card{background:var(--s1);border:1px solid var(--border);border-radius:6px;padding:5px 6px;display:flex;flex-direction:column;overflow:hidden;}
.grupo-label{font-family:"Barlow Condensed",sans-serif;font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--gold);padding:0 0 3px;border-bottom:1px solid var(--gold-brd);margin-bottom:3px;}
.grupo-table{width:100%;border-collapse:collapse;font-size:10px;flex:1;}
.grupo-table th{font-size:8px;font-weight:600;letter-spacing:.02em;text-transform:uppercase;color:var(--muted);padding:1px 2px;text-align:right;border-bottom:1px solid var(--border);}
.grupo-table th.l{text-align:left;}
.grupo-table td{padding:2px 2px;border-bottom:1px solid var(--border);text-align:right;color:var(--muted2);}
.grupo-table td.l{text-align:left;font-weight:500;color:var(--text);}
.grupo-table tr:last-child td{border-bottom:none;}
.grupo-table tr:nth-child(1) td,.grupo-table tr:nth-child(2) td{color:var(--text);}
.grupo-table tr:nth-child(1) td.pts,.grupo-table tr:nth-child(2) td.pts{color:var(--green);font-weight:700;}
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.08);border-radius:3px;}
</style>
</head>

<script>
const SHEET_ID = '1-xxMIIzSgGiRyHAURaOZ_RGaWb89OEE9Ha0vcDr-7gw';
const API_KEY  = 'AIzaSyAEQ7D5fCmGUwHFdFcoHYXvl7CDA5K1n3o';

function url(sheet, range) {
  return `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${encodeURIComponent(sheet+'!'+range)}?key=${API_KEY}`;
}
async function get(sheet, range) {
  const r = await fetch(url(sheet, range));
  if (!r.ok) throw new Error(r.status+' '+sheet);
  return (await r.json()).values || [];
}

const PREMIOS = ['🏆 Premio mayor','🥈 Premio mediano','🎫 Recupera inversión'];

function cc(str) {
  if (!str||str==='—') return 'same';
  if (str.includes('▲')) return 'up';
  if (str.includes('▼')) return 'down';
  return 'same';
}

function renderPodio(rankData, statsData) {
  const el = document.getElementById('podio');
  if (!rankData||rankData.length<2){el.innerHTML='<div class="loading" style="grid-column:1/-1">Sin datos</div>';return;}
  const rows = rankData.slice(1).filter(r=>r[0]).sort((a,b)=>(Number(b[1])||0)-(Number(a[1])||0));
  const smap = {};
  if (statsData) statsData.slice(1).forEach(r=>{if(r[0])smap[r[0].trim()]=r;});
  const cls=['p1','p2','p3'], medals=['🥇','🥈','🥉'];
  el.innerHTML = rows.slice(0,3).map((r,i)=>{
    const nombre=r[0]||'—', pts=r[1]||'0', cambio=r[5]||'—';
    const s=smap[nombre]||[], exactos=s[1]||'0', result=s[2]||'0';
    const c=cc(cambio);
    return `<div class="podio-card ${cls[i]}">
      <span class="podio-cambio ${c}">${cambio}</span>
      <div class="podio-medal">${medals[i]}</div>
      <div class="podio-pos">${i===0?'Líder':i===1?'2° lugar':'3° lugar'}</div>
      <div class="podio-nombre">${nombre}</div>
      <div class="podio-pts">${pts} <span style="font-size:13px;font-weight:500;opacity:.5;">pts</span></div>
      <div class="podio-sub">${exactos} exactos · ${result} resultados</div>
      <div class="podio-premio">${PREMIOS[i]}</div>
    </div>`;
  }).join('');
}

function renderMatchCard(vivoData) {
  const el = document.getElementById('match-card');
  if (!vivoData||vivoData.length<2){el.innerHTML='<div class="loading">Sin datos</div>';return;}
  const [estado,partido,col3,col4,minuto] = vivoData[1];

  if (estado==='EN VIVO'||estado==='MEDIO TIEMPO') {
    // Asegurar que los goles sean números válidos, no fechas ni null
    const g1 = (col3 !== null && col3 !== '' && !isNaN(Number(col3))) ? Number(col3) : '?';
    const g2 = (col4 !== null && col4 !== '' && !isNaN(Number(col4))) ? Number(col4) : '?';
    el.innerHTML=`<div class="match-card en-vivo">
      <div class="match-tag"><span class="live-pulse"></span>${estado==='MEDIO TIEMPO'?'MEDIO TIEMPO':'EN VIVO'} · ${minuto||''}</div>
      <div class="match-nombre">${partido}</div>
      <div class="match-score-wrap">
        <div class="match-score">${g1} — ${g2}</div>
      </div>
    </div>`;
  } else if (estado==='PROXIMO') {
    // col3 = hora, col4 = fecha — mostrar solo como texto
    const hora  = String(col3||'—');
    const fecha = String(col4||'—');
    el.innerHTML=`<div class="match-card proximo">
      <div class="match-tag">Próximo partido</div>
      <div class="match-nombre">${partido}</div>
      <div class="match-score-wrap">
        <div class="match-score">${hora}</div>
        <div class="match-minuto"><div class="match-fecha">${fecha}</div></div>
      </div>
    </div>`;
  } else {
    el.innerHTML=`<div class="match-card"><div class="match-tag" style="color:var(--muted)">Sin partido activo</div></div>`;
  }
}

function renderRanking(rankData, statsData, pronoData) {
  const tbody = document.getElementById('ranking-body');
  if (!rankData||rankData.length<2){tbody.innerHTML='<tr><td colspan="7" class="loading">Sin datos</td></tr>';return;}
  const rows = rankData.slice(1).filter(r=>r[0]).sort((a,b)=>(Number(b[1])||0)-(Number(a[1])||0));
  const smap={};if(statsData)statsData.slice(1).forEach(r=>{if(r[0])smap[r[0].trim()]=r;});
  const pmap={};if(pronoData)pronoData.slice(1).forEach(r=>{if(r[0])pmap[r[0].trim()]=r[1]||'—';});
  const maxPts=Number(rows[0]?.[1]||1)||1;
  const rcls=['r1','r2','r3'];
  tbody.innerHTML=rows.map((r,i)=>{
    const nombre=r[0]||'—', pts=Number(r[1])||0, cambio=r[5]||'—';
    const s=smap[nombre]||[], exactos=s[1]||'0', result=s[2]||'0';
    const prono=pmap[nombre]||r[2]||'—';
    const pct=Math.round((pts/maxPts)*100);
    const c=cc(cambio), rc=i<3?rcls[i]:'';
    return `<tr class="${rc}">
      <td class="rk-pos">${i+1}</td>
      <td class="rk-nombre">${nombre}</td>
      <td class="r cambio-cell ${c}">${cambio}</td>
      <td class="r rk-pts">${pts}<span class="rk-bar-wrap"><span class="rk-bar" style="width:${pct}%"></span></span></td>
      <td class="r"><span class="badge bg">${exactos}</span></td>
      <td class="r"><span class="badge bb">${result}</span></td>
      <td class="r"><span class="pill">${prono}</span></td>
    </tr>`;
  }).join('');
}

function renderPronosticos(data) {
  const el=document.getElementById('pronosticos-list');
  if(!data||data.length<2){el.innerHTML='<div class="loading">Sin datos</div>';return;}
  el.innerHTML=data.slice(1).filter(r=>r[0]).map(r=>`
    <div class="pron-row"><span>${r[0]}</span><span class="pron-score">${r[1]||'—'}</span></div>`).join('');
}

function renderStats(data) {
  const el=document.getElementById('stats-grid');
  if(!data||data.length<2){el.innerHTML='<div class="loading" style="grid-column:1/-1">Sin datos</div>';return;}
  const emojis=['🎯','🔴','🌟','😴','🏆','💀','📊','😬'];
  el.innerHTML=data.slice(1).filter(r=>r[0]&&emojis.some(e=>r[0].includes(e))).map(r=>`
    <div class="stat-card">
      <div class="stat-lbl">${r[0]}</div>
      <div class="stat-val">${r[1]||'—'}</div>
      <div class="stat-det">${r[2]||''}</div>
    </div>`).join('');
}

function renderPartidos(data, vivoData) {
  const el=document.getElementById('partidos-list');
  if(!data||data.length<2){el.innerHTML='<div class="loading">Sin datos</div>';return;}

  // Partidos en vivo desde Partido_EnVivo
  const enVivo=[];
  if(vivoData&&vivoData.length>1){
    vivoData.slice(1).forEach(r=>{
      if(r[0]==='EN VIVO'||r[0]==='MEDIO TIEMPO') enVivo.push(r[1]);
    });
  }

  // Columnas: A=Fecha, B=Partido, C=Orden, D=Goles_local, E=Goles_Visita
  const rows=data.slice(1).filter(r=>r[1]);

  // Partidos en vivo primero, luego jugados del más reciente al más antiguo
  const jugados=rows.filter(r=>r[3]!==undefined&&r[3]!==''&&r[3]!==null&&String(r[3])!=='null');
  const liveRows=rows.filter(r=>enVivo.some(n=>n===r[1]));
  const playedRows=jugados.filter(r=>!enVivo.some(n=>n===r[1])).reverse().slice(0,4);

  el.innerHTML=[...liveRows,...playedRows].map(r=>{
    const played=r[3]!==undefined&&r[3]!==''&&r[3]!==null&&String(r[3])!=='null';
    const isLive=enVivo.some(n=>n===r[1]);
    const cls=isLive?'live':played?'played':'pending';
    const score=isLive?'⚽ EN VIVO':played?r[3]+'-'+r[4]:'vs';
    return `<div class="part-row">
      <span class="part-fecha">${r[0]||''}</span>
      <span class="part-nombre">${r[1]||''}</span>
      <span class="part-score ${cls}">${score}</span>
    </div>`;
  }).join('');
}

function renderGrupos(data) {
  const el = document.getElementById('grupos-list');
  if(!data||data.length<2){el.innerHTML='<div class="loading">Sin datos</div>';return;}

  const rows = data.slice(1).filter(r=>r[0]&&r[1]);
  const grupos = {};
  rows.forEach(r=>{
    const g = r[0];
    if(!grupos[g]) grupos[g]=[];
    grupos[g].push(r);
  });

  if(Object.keys(grupos).length === 0) {
    el.innerHTML='<div class="loading">Esperando resultados...</div>';
    return;
  }

  // Grilla 3 columnas — cada grupo es una tarjeta compacta
  const tarjetas = Object.keys(grupos).sort().map(g=>{
    const equipos = grupos[g];
    return `<div class="grupo-card">
      <div class="grupo-label">${g}</div>
      <table class="grupo-table">
        <thead><tr>
          <th class="l">Equipo</th>
          <th>PJ</th><th>DIF</th><th class="pts">PTS</th>
        </tr></thead>
        <tbody>${equipos.map((r,i)=>`<tr>
          <td class="l">${r[1]}</td>
          <td>${r[2]||0}</td>
          <td>${r[8]||0}</td>
          <td class="pts" style="${i<2?'color:var(--green);font-weight:700':''}">${r[9]||0}</td>
        </tr>`).join('')}</tbody>
      </table>
    </div>`;
  });

  el.innerHTML = `<div class="grupos-grid">${tarjetas.join('')}</div>`;
}

async function cargarDatos() {
  try {
    const [rankData,statsDesData,statsGenData,pronData,partData,vivoData,gruposData] = await Promise.all([
      get('Ranking_data',       'A1:F20'),
      get('Stats_Desglose',     'A1:E20'),
      get('Stats_General',      'A1:C10'),
      get('Pronosticos_Proximo','A1:B20'),
      get('Dashboard_data',     'A1:E80'),
      get('Partido_EnVivo',     'A1:F10'),
      get('Grupos',             'A1:J200'),
    ]);

    renderPodio(rankData, statsDesData);
    renderMatchCard(vivoData);
    renderRanking(rankData, statsDesData, pronData);
    renderPartidos(partData, vivoData);
    renderStats(statsGenData);
    renderGrupos(gruposData);

    document.getElementById('update-time').textContent =
      'Actualizado ' + new Date().toLocaleTimeString('es-CL',{hour:'2-digit',minute:'2-digit'});
  } catch(e) {
    console.error(e);
    document.getElementById('update-time').textContent='Error — reintentando...';
  }
}

cargarDatos();
// Refrescar cada 60 segundos cuando hay partido en vivo, cada 2 min si no
setInterval(cargarDatos, 60*1000);
</script>
